}

# 17. Фильтрация архивных типов контента
query GetAdminArchivedContentTypes {
  contentTypes(
    pagination: { page: 1, limit: 10 }
    sort: { field: "updatedAt", direction: DESC }
    filters: {
      status: [ARCHIVED]
    }
  ) {
    contentTypes {
      id
      name
      status
      updatedAt
      _count {
        articles
      }
    }
  }
}

# 18. Сортировка по количеству статей
query GetAdminContentTypesSortByArticleCount {
  contentTypes(
    pagination: { page: 1, limit: 10 }
    sort: { field: "_count.articles", direction: DESC }
    filters: { base: {} }
  ) {
    contentTypes {
      id
      name
      _count {
        articles
      }
    }
  }
} 