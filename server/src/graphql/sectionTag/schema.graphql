type SectionTag {
  id: ID!
  name: String!
  slug: String!
  description: String
  createdAt: String!
  updatedAt: String!
  # Связь со статьями
  articles: [Article!]
  # Количество статей (для админ панели)
  _count: SectionTagCount
}

type SectionTagCount {
  articles: Int!
}

# Специфичные для тегов фильтры
input TagFiltersInput {
  base: BaseFiltersInput

  # Специфичные для тегов
  hasArticles: Boolean
}

type TagsResponse {
  tags: [SectionTag!]!
  pagination: PaginationInfo!
  filters: TagFilters!
  sort: SortInfo!
  search: SearchInfo
}

type TagFilters {
  base: BaseFiltersInfo
  hasArticles: Boolean
}

type TagStats {
  totalArticles: Int!
  articlesThisMonth: Int!
  averageReadTime: Float
  popularAuthors: [User!]
}

type ArticlesByTagResponse {
  articles: [Article!]!
  totalCount: Int!
  totalPages: Int!
  currentPage: Int!
}

extend type Query {
  # Запросы для страницы тега
  tag(slug: String!): SectionTag
  articlesByTag(tagSlug: String!, page: Int = 1, limit: Int = 10): ArticlesByTagResponse!
  tagStats(tagSlug: String!): TagStats

  # Запросы для управления тегами (требуют права admin)
  sectionTags(
    pagination: PaginationInput!
    sort: SortInput!
    filters: TagFiltersInput!
    search: SearchInput
  ): TagsResponse!
}

# Input типы для мутаций
input CreateTagInput {
  name: String!
  slug: String!
  description: String
}

input UpdateTagInput {
  name: String
  slug: String
  description: String
}

input MergeTagsInput {
  sourceTagIds: [ID!]!
  targetTagId: ID!
}

extend type Mutation {
  # Админ мутации для управления тегами
  createTag(input: CreateTagInput!): SectionTag!
  updateTag(id: ID!, input: UpdateTagInput!): SectionTag!
  deleteTag(id: ID!): SectionTag!
  mergeTags(input: MergeTagsInput!): SectionTag!
}
