enum ArticleStatus {
  draft
  review
  published
  archived
}

type Article {
  id: ID!
  title: String!
  slug: String!
  dek: String
  body: String!
  excerpt: String
  featuredImage: String
  status: ArticleStatus!
  publishedAt: String
  createdAt: String!
  updatedAt: String!
  author: User!
  contentType: ContentType!
  sectionTags: [SectionTag!]!
}

# Специфичные для статей фильтры
input ArticleFiltersInput {
  # Наследуем базовые фильтры
  base: BaseFiltersInput

  # Статус статей
  status: [ArticleStatus!]

  # Специфичные для статей
  authorId: [ID!]
  typeId: [ID!]
  tagIds: [ID!]
  publishedAt: DateRangeInput
}

type ArticlesResponse {
  articles: [Article!]!
  pagination: PaginationInfo!
  filters: ArticleFilters!
  sort: SortInfo!
  search: SearchInfo
}

type ArticleFilters {
  base: BaseFiltersInfo
  status: [ArticleStatus!]
  authorId: [ID!]
  typeId: [ID!]
  tagIds: [ID!]
  publishedAt: DateRangeInfo
}

type ArticleDetail {
  article: Article!
  recommendedArticles: [Article!]!
  relatedArticles: [Article!]!
  articleStats: ArticleStats
}

type ArticleStats {
  readTime: Int! # В минутах
  wordCount: Int!
  viewCount: Int # В будущем
  shareCount: Int # В будущем
}

type RelatedArticlesResponse {
  articles: [Article!]!
  totalCount: Int!
}

extend type Query {
  article(slug: String!): Article

  # Комплексный запрос для страницы статьи
  articleDetail(slug: String!): ArticleDetail

  # Отдельные запросы для страницы статьи
  recommendedArticles(articleSlug: String!, limit: Int = 5): [Article!]!
  relatedArticles(articleSlug: String!, limit: Int = 10): [Article!]!
  articleStats(slug: String!): ArticleStats

  # Запросы для главной страницы
  featuredArticles(limit: Int = 5): [Article!]!
  latestArticles(limit: Int = 20, excludeFeatured: Boolean = false): [Article!]!
  popularArticles(timeRange: String = "week", limit: Int = 10): [Article!]!

  # Запросы для управления статьями (требуют права admin)
  articles(
    pagination: PaginationInput!
    sort: SortInput!
    filters: ArticleFiltersInput!
    search: SearchInput
  ): ArticlesResponse!
}

# Типы для мутаций
input CreateArticleInput {
  title: String!
  body: String!
  slug: String!
  dek: String
  excerpt: String
  featuredImage: String
  typeId: ID!
  sectionTags: [ID!]
}

input UpdateArticleInput {
  title: String
  body: String
  slug: String
  dek: String
  excerpt: String
  featuredImage: String
  typeId: ID
  sectionTags: [ID!]
}

extend type Mutation {
  createArticle(input: CreateArticleInput!): Article!
  updateArticle(id: ID!, input: UpdateArticleInput!): Article!

  # Мутации для смены статуса
  archiveArticle(id: ID!): Article!
  requestReview(id: ID!): Article!
  revertToDraft(id: ID!): Article!

  # Только для администраторов
  setArticleStatus(id: ID!, status: ArticleStatus!): Article!
  bulkDeleteArticles(ids: [ID!]!): [Article!]!
  bulkUpdateArticleStatus(ids: [ID!]!, status: ArticleStatus!): [Article!]!
}
