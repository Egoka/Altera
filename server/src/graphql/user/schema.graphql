scalar JSON
enum Role {
  reader
  author
  editor
  admin
}

type User {
  id: ID!
  name: String!
  email: String!
  bio: String
  photoUrl: String
  role: Role!
  slug: String!
  socialLinks: JSON
  createdAt: String!
  updatedAt: String!
}

extend type Query {
  users: [User!]!
  hello: String
}
