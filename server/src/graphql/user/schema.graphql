scalar JSON
enum Role {
  reader
  author
  editor
  admin
}

type User {
  id: ID!
  name: String!
  email: String!
  bio: String
  photoUrl: String
  role: Role!
  slug: String!
  socialLinks: JSON
  createdAt: String!
  updatedAt: String!
  # Для страницы автора
  articles: [Article!]
}

type UserArticleStats {
  total: Int!
  published: Int!
  draft: Int!
  review: Int!
  archived: Int!
}

type AuthorStats {
  totalArticles: Int!
  articlesThisMonth: Int!
  popularTags: [SectionTag!]
}

type ArticlesByAuthorResponse {
  articles: [Article!]!
  totalCount: Int!
  totalPages: Int!
  currentPage: Int!
}

extend type Query {
  users: [User!]
  user(slug: String!): User
  me: User
  myArticlesStats: UserArticleStats

  # Запросы для страницы автора
  author(slug: String!): User
  articlesByAuthor(authorSlug: String!, page: Int = 1, limit: Int = 10): ArticlesByAuthorResponse!
  authorStats(authorSlug: String!): AuthorStats
}
