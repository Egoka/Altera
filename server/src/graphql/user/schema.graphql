scalar JSON
enum Role {
  reader
  author
  editor
  admin
}

type User {
  id: ID!
  name: String!
  email: String!
  bio: String
  photoUrl: String
  role: Role!
  slug: String!
  socialLinks: JSON
  createdAt: String!
  updatedAt: String!
  # Для страницы автора
  articles: [Article!]
  # Количество статей (для админ панели)
  _count: UserCount
}

type UserCount {
  articles: Int!
}

# Специфичные для пользователей фильтры
input UserFiltersInput {
  base: BaseFiltersInput

  # Специфичные для пользователей
  role: [Role!]
  hasArticles: Boolean
}

type UsersResponse {
  users: [User!]!
  pagination: PaginationInfo!
  filters: UserFilters!
  sort: SortInfo!
  search: SearchInfo
}

type UserFilters {
  base: BaseFiltersInfo
  role: [Role!]
  hasArticles: Boolean
}

type UserArticleStats {
  total: Int!
  published: Int!
  draft: Int!
  review: Int!
  archived: Int!
}

type AuthorStats {
  totalArticles: Int!
  articlesThisMonth: Int!
  popularTags: [SectionTag!]
}

type ArticlesByAuthorResponse {
  articles: [Article!]!
  totalCount: Int!
  totalPages: Int!
  currentPage: Int!
}

extend type Query {
  user(slug: String!): User
  me: User
  myArticlesStats: UserArticleStats

  # Запросы для страницы автора
  author(slug: String!): User
  articlesByAuthor(authorSlug: String!, page: Int = 1, limit: Int = 10): ArticlesByAuthorResponse!
  authorStats(authorSlug: String!): AuthorStats

  # Запросы для управления пользователями (требуют права admin)
  users(pagination: PaginationInput!, sort: SortInput!, filters: UserFiltersInput!, search: SearchInput): UsersResponse!
}
